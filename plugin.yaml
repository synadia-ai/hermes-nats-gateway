name: nats-platform
label: NATS
kind: platform
version: 0.1.1
description: >
  Synadia Agent Protocol for NATS (v0.3) gateway adapter for Hermes Agent.
  Registers a synadia_ai.agents.AgentService at the subject
  agents.prompt.<agent>.<owner>.<session_name> and routes inbound NATS
  prompts through the gateway's MessageEvent pipeline. Authentication is
  handled at the NATS server layer (NKey / JWT / TLS) — the transport
  authenticates the caller, so the adapter trusts every delivered message.
author: Synadia Communications, Inc.
# ``requires_env`` and ``optional_env`` entries are surfaced in the
# ``hermes config`` UI via the platform-plugin env var injector in
# ``hermes_cli/config.py``.
#
# A transport is also REQUIRED — exactly one of NATS_URL / NATS_CONTEXT — but
# ``requires_env`` is a flat "all of these must be set" list and cannot express
# that XOR, so the two transport vars stay under ``optional_env`` and the rule
# is enforced at runtime by ``adapter.validate_config``. Configure via
# ``hermes setup gateway`` (its wizard always asks for a transport); the bare
# ``hermes config`` env editor lets you skip it and leave a half-config that
# fails validation at gateway start.
requires_env:
  - name: HERMES_NATS_OWNER
    description: "Owner token — the 4th segment of the NATS subject (e.g. your GitHub handle)"
    prompt: "Owner"
    password: false
  - name: HERMES_NATS_SESSION_NAME
    description: "Session name — the 5th segment of the NATS subject; one AgentService = one session"
    prompt: "Session name"
    password: false
optional_env:
  - name: NATS_URL
    description: "TRANSPORT (REQUIRED — set exactly one of NATS_URL or NATS_CONTEXT): NATS server URL, e.g. nats://demo.nats.io. Mutually exclusive with NATS_CONTEXT; enforced by validate_config at gateway start."
    prompt: "NATS server URL"
    password: false
  - name: NATS_CONTEXT
    description: "TRANSPORT (REQUIRED — set exactly one of NATS_URL or NATS_CONTEXT): name of an existing NATS CLI context for connection options. Mutually exclusive with NATS_URL; enforced by validate_config at gateway start."
    prompt: "NATS context name"
    password: false
  - name: HERMES_NATS_AGENT
    description: "Agent token — the 3rd segment of the NATS subject (default: hermes)"
    prompt: "Agent name"
    password: false
  - name: NATS_ALLOWED_USERS
    description: "Comma-separated list of NATS-authenticated user identities allowed to talk to the bot"
    prompt: "Allowed users (comma-separated)"
    password: false
  - name: NATS_ALLOW_ALL_USERS
    description: "Allow any NATS-authenticated caller to talk to the bot (the transport already authenticates the user)"
    prompt: "Allow all users? (true/false)"
    password: false
